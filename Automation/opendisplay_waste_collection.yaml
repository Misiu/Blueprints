blueprint:
  name: OpenDisplay Waste Collection Display
  description: >
    Displays waste collection schedule on OpenDisplay.

    OpenDisplay integration must be installed.
  domain: automation
  author: Misiu
  input:
    epaper_target:
      name: Epaper
      description: Select OpenDisplay device
      selector:
        device:
          multiple: false
          integration: opendisplay

    bin1_target:
      name: First bin
      description: Top-left bin
      selector:
        entity:
          multiple: false
          filter:
            domain: calendar

    bin2_target:
      name: Second bin
      description: Top-right bin
      selector:
        entity:
          multiple: false
          filter:
            domain: calendar

    bin3_target:
      name: Third bin
      description: Bottom-left bin
      selector:
        entity:
          multiple: false
          filter:
            domain: calendar

    bin4_target:
      name: Fourth bin
      description: Bottom-right bin
      selector:
        entity:
          multiple: false
          filter:
            domain: calendar

    settings:
      name: Settings
      icon: mdi:cog
      collapsed: true
      description: These options control the behavior of this blueprint
      input:
        language:
          name: Language
          description: Select display language
          default: en
          selector:
            select:
              mode: dropdown
              options:
                - label: English
                  value: en
                - label: Polski
                  value: pl
                - label: Nederlands
                  value: nl
                - label: Deutsch
                  value: de
                - label: Español
                  value: es

        days_before:
          name: Alert before X days
          description: Show on red background X days before planned collection date
          default: 1
          selector:
            number:
              min: 0
              max: 20
              mode: slider
              step: 1

        show_last_refresh:
          name: Show last refresh time
          description: If enabled, the last refresh date and time will be shown in the bottom-right corner
          default: false
          selector:
            boolean: {}

alias: Update Bins Tag
description: ""

trigger:
  - platform: time_pattern
    hours: /2

  - platform: homeassistant
    event: start

condition: []

variables:
  language: !input language
  days_before: !input days_before
  show_last_refresh: !input show_last_refresh

  translations: >
    {{
      {
        'en': {
          'today': 'Today',
          'tomorrow': 'Tomorrow',
          'in_days': 'in {} days'
        },
        'pl': {
          'today': 'Dziś',
          'tomorrow': 'Jutro',
          'in_days': 'za {} dni'
        },
        'nl': {
          'today': 'Vandaag',
          'tomorrow': 'Morgen',
          'in_days': 'over {} dagen'
        },
        'de': {
          'today': 'Heute',
          'tomorrow': 'Morgen',
          'in_days': 'in {} Tagen'
        },
        'es': {
          'today': 'Hoy',
          'tomorrow': 'Mañana',
          'in_days': 'en {} días'
        }
      }[language]
    }}

  bin1: !input bin1_target
  bin1_name: "{{ state_attr(bin1, 'friendly_name') }}"
  bin1_days: >
    {% set start_time = state_attr(bin1, 'start_time') %}
    {% if start_time %}
      {{ ((start_time | as_datetime | as_local) - today_at()).days }}
    {% else %}
      {{ none }}
    {% endif %}
  bin1_text: >
    {% if bin1_days is none %}
      --
    {% elif bin1_days == 0 %}
      {{ translations.today }}
    {% elif bin1_days == 1 %}
      {{ translations.tomorrow }}
    {% else %}
      {{ translations.in_days.format(bin1_days) }}
    {% endif %}

  bin2: !input bin2_target
  bin2_name: "{{ state_attr(bin2, 'friendly_name') }}"
  bin2_days: >
    {% set start_time = state_attr(bin2, 'start_time') %}
    {% if start_time %}
      {{ ((start_time | as_datetime | as_local) - today_at()).days }}
    {% else %}
      {{ none }}
    {% endif %}
  bin2_text: >
    {% if bin2_days is none %}
      --
    {% elif bin2_days == 0 %}
      {{ translations.today }}
    {% elif bin2_days == 1 %}
      {{ translations.tomorrow }}
    {% else %}
      {{ translations.in_days.format(bin2_days) }}
    {% endif %}

  bin3: !input bin3_target
  bin3_name: "{{ state_attr(bin3, 'friendly_name') }}"
  bin3_days: >
    {% set start_time = state_attr(bin3, 'start_time') %}
    {% if start_time %}
      {{ ((start_time | as_datetime | as_local) - today_at()).days }}
    {% else %}
      {{ none }}
    {% endif %}
  bin3_text: >
    {% if bin3_days is none %}
      --
    {% elif bin3_days == 0 %}
      {{ translations.today }}
    {% elif bin3_days == 1 %}
      {{ translations.tomorrow }}
    {% else %}
      {{ translations.in_days.format(bin3_days) }}
    {% endif %}

  bin4: !input bin4_target
  bin4_name: "{{ state_attr(bin4, 'friendly_name') }}"
  bin4_days: >
    {% set start_time = state_attr(bin4, 'start_time') %}
    {% if start_time %}
      {{ ((start_time | as_datetime | as_local) - today_at()).days }}
    {% else %}
      {{ none }}
    {% endif %}
  bin4_text: >
    {% if bin4_days is none %}
      --
    {% elif bin4_days == 0 %}
      {{ translations.today }}
    {% elif bin4_days == 1 %}
      {{ translations.tomorrow }}
    {% else %}
      {{ translations.in_days.format(bin4_days) }}
    {% endif %}

  last_refresh: "{{ now().strftime('%Y-%m-%d %H:%M') if show_last_refresh else '' }}"

action:
  - service: opendisplay.drawcustom
    target:
      device_id: !input epaper_target
    data:
      background: white
      dry-run: false
      rotate: 0
      payload:
        - type: line
          fill: red
          width: 3
          x_start: 5
          y_start: 64
          x_end: 121
          y_end: 64

        - type: line
          fill: red
          width: 3
          x_start: 175
          y_start: 64
          x_end: 291
          y_end: 64

        - type: line
          fill: red
          width: 3
          x_start: 148
          y_start: 5
          x_end: 148
          y_end: 37

        - type: line
          fill: red
          width: 3
          x_start: 148
          y_start: 89
          x_end: 148
          y_end: 123

        - type: rectangle
          outline: white
          fill: "{{ 'white' if bin1_days is none or bin1_days > days_before else 'red' }}"
          width: 1
          x_start: 5
          y_start: 5
          x_end: 143
          y_end: 59

        - type: text
          value: "{{ bin1_name }}"
          font: ppb.ttf
          x: 70
          y: 21
          size: 18
          anchor: mm
          color: "{{ 'black' if bin1_days is none or bin1_days > days_before else 'white' }}"

        - type: text
          value: "{{ bin1_text }}"
          font: ppb.ttf
          x: 70
          y: 43
          size: 18
          anchor: mm
          color: "{{ 'black' if bin1_days is none or bin1_days > days_before else 'white' }}"

        - type: rectangle
          outline: white
          fill: "{{ 'white' if bin2_days is none or bin2_days > days_before else 'red' }}"
          width: 1
          x_start: 153
          y_start: 5
          x_end: 291
          y_end: 59

        - type: text
          value: "{{ bin2_name }}"
          font: ppb.ttf
          x: 226
          y: 21
          size: 18
          anchor: mm
          color: "{{ 'black' if bin2_days is none or bin2_days > days_before else 'white' }}"

        - type: text
          value: "{{ bin2_text }}"
          font: ppb.ttf
          x: 226
          y: 43
          size: 18
          anchor: mm
          color: "{{ 'black' if bin2_days is none or bin2_days > days_before else 'white' }}"

        - type: rectangle
          outline: white
          fill: "{{ 'white' if bin3_days is none or bin3_days > days_before else 'red' }}"
          width: 1
          x_start: 5
          y_start: 69
          x_end: 143
          y_end: 123

        - type: text
          value: "{{ bin3_name }}"
          font: ppb.ttf
          x: 70
          y: 85
          size: 18
          anchor: mm
          color: "{{ 'black' if bin3_days is none or bin3_days > days_before else 'white' }}"

        - type: text
          value: "{{ bin3_text }}"
          font: ppb.ttf
          x: 70
          y: 107
          size: 18
          anchor: mm
          color: "{{ 'black' if bin3_days is none or bin3_days > days_before else 'white' }}"

        - type: rectangle
          outline: white
          fill: "{{ 'white' if bin4_days is none or bin4_days > days_before else 'red' }}"
          width: 1
          x_start: 153
          y_start: 69
          x_end: 291
          y_end: 123

        - type: text
          value: "{{ bin4_name }}"
          font: ppb.ttf
          x: 226
          y: 85
          size: 18
          anchor: mm
          color: "{{ 'black' if bin4_days is none or bin4_days > days_before else 'white' }}"

        - type: text
          value: "{{ bin4_text }}"
          font: ppb.ttf
          x: 226
          y: 107
          size: 18
          anchor: mm
          color: "{{ 'black' if bin4_days is none or bin4_days > days_before else 'white' }}"

        - type: icon
          value: circle
          x: 113
          y: 29
          size: 70
          color: white

        - type: icon
          value: trash-can
          x: 123
          y: 39
          size: 50
          color: red

        - type: text
          value: "{{ last_refresh }}"
          font: ppb.ttf
          size: 10
          x: 295
          y: 127
          anchor: rb
          color: black

mode: single
